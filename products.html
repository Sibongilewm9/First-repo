<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Product Showcase</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <h1>Our Products</h1>
    </header>

    <main class="product-grid">
      <div class="product-card">
        <img
          src="https://i.ibb.co/nTTZ0Tq/81-Mu-LOf5a9-L-AC-SL1500.jpg"
          alt="Product 1"
        />
        <h2>Wireless Headphones</h2>
        <p class="price">R250.00</p>
        <button>Add to Cart</button>
      </div>

      <div class="product-card">
        <img
          src="https://i.ibb.co/HL0VJcvH/gen-ecommerce-b46e.webp"
          alt="Product 2"
        />
        <h2>Smart Watch</h2>
        <p class="price">R370.00</p>
        <button>Add to Cart</button>
      </div>

      <div class="product-card">
        <img
          src="https://i.ibb.co/G3FF7KGV/61y71-CZRLv-L-AC-SX522.jpg"
          alt="Product 3"
        />
        <h2>Bluetooth Speaker</h2>
        <p class="price">R400.00</p>
        <button>Add to Cart</button>
      </div>

      <div class="product-card">
        <img
          src="https://i.ibb.co/Y7zzQzfp/5116x-H5-ZOb-L-AC-SX522.jpg"
          alt="Product 4"
        />
        <h2>Laptop Stand</h2>
        <p class="price">R169.99</p>
        <button>Add to Cart</button>
      </div>

      <div class="product-card">
        <img
          src="https://i.ibb.co/jPy4JP42/315t3-KF-c-EL-AC.jpg"
          alt="Product 5"
        />
        <h2>Desk Lamp</h2>
        <p class="price">R950.00</p>
        <button>Add to Cart</button>
      </div>

      <div class="product-card">
        <img src="https://i.ibb.co/hF7Fv4L0/51-Tz0-Ku-PWUL-AC-SX466.jpg" />
        <h2>Webcam HD</h2>
        <p class="price">R550.00</p>
        <button>Add to Cart</button>
      </div>
    </main>
  </body>
</html>
